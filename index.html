        // =======================================================
        // โซนที่ 2: DOM MANIPULATION (พี่เตรียมไว้ให้แล้ว)
        // =======================================================
        function renderUI(todos) {
            const list = document.getElementById('todo-list');
            list.innerHTML = ""; 
            if (todos.length === 0) return list.innerHTML = "<p>ไม่มีข้อมูล</p>";

            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                
                const span = document.createElement('span');
                span.textContent = todo.text;

                const actions = document.createElement('div');
                
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'btn-toggle';
                toggleBtn.textContent = todo.completed ? 'ยกเลิก' : 'เสร็จแล้ว';
                toggleBtn.onclick = () => updateTodo(todo.id, todo.completed); // ผูกปุ่มเข้ากับฟังก์ชัน PATCH

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete';
                deleteBtn.textContent = 'ลบ';
                deleteBtn.onclick = () => deleteTodo(todo.id); // ผูกปุ่มเข้ากับฟังก์ชัน DELETE

                actions.appendChild(toggleBtn);
                actions.appendChild(deleteBtn);
                li.append(span, actions);
                list.appendChild(li);
            });
        }

        // ผูกปุ่ม "เพิ่มข้อมูล" เข้ากับฟังก์ชัน POST
        document.getElementById('add-btn').onclick = () => {
            const input = document.getElementById('todo-input');
            if (!input.value) return alert("พิมพ์ก่อนสิ!");
            createTodo(input.value);
            input.value = ""; 
        };
