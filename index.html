<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Todo App</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
      }
      .todo-item {
        padding: 6px;
        cursor: pointer;
      }
      .completed {
        text-decoration: line-through;
        color: gray;
      }
    </style>
  </head>
  <body>
    <h2>Todo List</h2>
    <input id="text-input" placeholder="ชื่องาน" />
    <button id="add-btn">เพิ่มงาน</button>
    <hr />
    <ul id="todo-list"></ul>

    <script>
      const input = document.getElementById("text-input");
      const addBtn = document.getElementById("add-btn");
      const list = document.getElementById("todo-list");

      let todos = [
        {
          id: 1,
          text: "Learn JavaScript",
          completed: false,
        },
      ];
      render();
     function render() {
  list.innerHTML = "";

  todos.forEach(todo => {
    const li = document.createElement("li");
    li.className = "todo-item";
    li.dataset.id = todo.id;

    // สร้าง span เก็บ text
    const span = document.createElement("span");
    span.textContent = todo.text;
    li.appendChild(span);

    if (todo.completed) li.classList.add("completed");

    // ปุ่ม edit
    const editBtn = document.createElement("button");
    editBtn.textContent = "edit";
    editBtn.className = "edit-btn";
    li.appendChild(editBtn);

    // ปุ่ม delete
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "delete";
    deleteBtn.className = "delete-btn";
    li.appendChild(deleteBtn);

    list.appendChild(li);
  });
}

      list.addEventListener("click", (e) => {
  // หา li ที่ใกล้ที่สุดจาก element ที่คลิก
  const li = e.target.closest("li");
  if (!li) return; // ถ้าไม่ได้คลิกใน li จบเลย
  const id = Number(li.dataset.id); // ดึง id จาก dataset

  // หา todo ใน state
  const todo = todos.find(t => t.id === id);
  if (!todo) return;
if(e.target.classList.contains("edit-btn")){
        const id = Number(e.target.parentElement.dataset.id)
        const todo = todos.find(t => t.id === id)
        const newText = prompt("Edit todo", todo.text)
        if(newText !== null && newText.trim() !== ""){
            todo.text = newText.trim() // update state
            render()
        }
    }

if(e.target.classList.contains("delete-btn")){
        const id = Number(e.target.parentElement.dataset.id)
        todos = todos.filter(todo => todo.id !== id)
        render()
        return 
    }
  // ถ้าคลิกที่ span หรือ li ให้ toggle completed
  if (e.target.tagName === "LI" || e.target.tagName === "SPAN") {
    todo.completed = !todo.completed; // สลับค่า true/false
    render(); // วาด UI ใหม่จาก state
  }})

      addBtn.addEventListener("click", () => {
        const text = input.value.trim();
        if (text === "") return alert("กรุณากรอกงานก่อน");

        // สร้าง object todo ใหม่
        const newTodo = {
          id: Date.now(), // ใช้เวลาปัจจุบันเป็น id ไม่ซ้ำกัน
          text: text,
          completed: false,
        };

        // เพิ่มลง state
        todos.push(newTodo);

        input.value = "";

        // วาด UI ใหม่
        render();
      });
    </script>
  </body>
</html>
