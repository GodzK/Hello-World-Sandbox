<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>Counter 1-100</h1>
<button id = "incre">Click me </button>
<div class="content"></div>
<script>
        let i = 1;
        const incre = document.querySelector("#incre");
        const content = document.querySelector('.content');

        incre.addEventListener('click', () => {
            // 1. [CREATE] สร้าง Element แม่ (Div)
            const div = document.createElement('div');
            div.className = 'item';

            // 2. สร้างส่วนแสดงผล (Span)
            const span = document.createElement('span');
            span.textContent = `${i}`;
            
            // 3. [UPDATE] สร้างปุ่มแก้ไข
            const editBtn = document.createElement('button');
            editBtn.textContent = 'Edit';
            editBtn.onclick = () => {
                const newValue = prompt("แก้ไขเป็นเลขอะไรดี?", span.textContent);
                if (newValue) span.textContent = newValue;
            };

            // 4. [DELETE] สร้างปุ่มลบ
            const delBtn = document.createElement('button');
            delBtn.textContent = 'Delete';
            delBtn.style.color = 'red';
            delBtn.onclick = () => {
                div.remove(); // ลบ Element ตัวมันเองออกไปเลย
            };

            // ประกอบร่างแล้วใส่ลงในหน้าเว็บ
            div.append(span,editBtn,delBtn);
            content.appendChild(div);
            

            i++; // เพิ่มค่าตัวนับ
        });
    </script>
</body>
</html>
